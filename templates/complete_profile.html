{% extends 'base.html' %}

{% block title %}Profilni to'ldirish{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto py-10">
    <div class="bg-white rounded-[2rem] p-10 shadow-xl border border-slate-100">
        <div class="text-center mb-10">
            <div class="w-20 h-20 bg-blue-50 rounded-3xl flex items-center justify-center text-primary mx-auto mb-4 shadow-inner">
                <span class="material-symbols-outlined text-4xl">person_add</span>
            </div>
            <h2 class="text-3xl font-extrabold text-primary tracking-tight">Profilni yakunlash</h2>
            <p class="text-slate-500 mt-2">Mentor AI sizga aniqroq maslahat berishi uchun asosiy ma'lumotlarni kiriting.</p>
        </div>

        <form method="POST" class="space-y-6">
            {% csrf_token %}
            <div class="grid grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-widest pl-1">Ism</label>
                    <input type="text" name="first_name" required value="{{ user.first_name }}"
                        class="w-full px-5 py-3 rounded-2xl bg-slate-50 border-none focus:ring-2 focus:ring-primary/20 transition-all font-medium text-slate-700" 
                        placeholder="Masalan: Abdulla">
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-widest pl-1">Familiya</label>
                    <input type="text" name="last_name" required value="{{ user.last_name }}"
                        class="w-full px-5 py-3 rounded-2xl bg-slate-50 border-none focus:ring-2 focus:ring-primary/20 transition-all font-medium text-slate-700" 
                        placeholder="Masalan: Qodiriy">
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-xs font-bold text-slate-400 uppercase tracking-widest pl-1">Telefon raqam</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">call</span>
                    <input type="text" name="phone" required value="{{ profile.phone_number|default:'' }}"
                        class="w-full pl-12 pr-5 py-3 rounded-2xl bg-slate-50 border-none focus:ring-2 focus:ring-primary/20 transition-all font-medium text-slate-700" 
                        placeholder="+998 90 123 45 67">
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-xs font-bold text-slate-400 uppercase tracking-widest pl-1">Tug'ilgan sana</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">calendar_today</span>
                    <input type="date" name="birth_date" required value="{{ profile.birth_date|date:'Y-m-d' }}"
                        class="w-full pl-12 pr-5 py-3 rounded-2xl bg-slate-50 border-none focus:ring-2 focus:ring-primary/20 transition-all font-medium text-slate-700">
                </div>
            </div>

            <div class="pt-6">
                <button type="submit" class="w-full py-4 bg-primary text-white rounded-2xl font-bold text-lg shadow-lg hover:opacity-90 transition-all transform hover:scale-[1.01]">
                    Saqlash va Davom Etish
                </button>
                <p class="text-[10px] text-center text-slate-400 mt-4 uppercase font-bold tracking-widest">Ma'lumotlaringiz xavfsiz saqlanadi</p>
            </div>
        </form>
    </div>
</div>
{% endblock %}
