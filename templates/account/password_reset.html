{% extends 'base.html' %}

{% block title %}Parolni tiklash{% endblock %}

{% block content %}
<div class="h-full flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 bg-slate-50/50">
    <div class="max-w-md w-full space-y-8">
        <!-- Auth Card -->
        <div class="bg-white rounded-[3rem] p-10 shadow-2xl border border-slate-100/50 backdrop-blur-sm relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-primary to-secondary"></div>
            
            <div class="text-center mb-10">
                <div class="inline-flex p-4 rounded-3xl bg-primary/5 text-primary mb-6">
                    <span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">lock_reset</span>
                </div>
                <h2 class="text-3xl font-headline font-black text-primary tracking-tight mb-2">
                    Parolni tiklash
                </h2>
                <p class="text-slate-500 font-medium">Elektron pochtangizni kiriting, biz parolni yangilash havolasini yuboramiz.</p>
            </div>

            <form method="POST" action="{% url 'account_reset_password' %}" class="space-y-6" id="reset_form">
                {% csrf_token %}
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest pl-4">E-mail</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">mail</span>
                        <input type="email" name="email" required class="w-full pl-12 pr-6 py-4 rounded-2xl bg-slate-50 border-none focus:ring-2 focus:ring-primary/20 transition-all font-semibold text-primary" placeholder="example@mail.com">
                    </div>
                </div>

                <button type="submit" class="w-full py-5 gradient-button text-white rounded-[2rem] font-bold text-lg shadow-xl hover:shadow-primary/20 transition-all active:scale-[0.98]">
                    Havolani yuborish
                </button>
            </form>

            <div class="mt-10 text-center border-t border-slate-50 pt-8">
                <p class="text-sm font-medium text-slate-500">
                    Sizga yordam kerakmi? 
                    <a href="{% url 'account_login' %}" class="text-primary font-bold hover:underline ml-1">Kirish sahifasiga qaytish</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
