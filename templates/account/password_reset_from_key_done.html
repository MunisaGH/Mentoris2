{% extends 'base.html' %}

{% block title %}Parol o'zgartirildi{% endblock %}

{% block content %}
<div class="h-full flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 bg-slate-50/50">
    <div class="max-w-md w-full space-y-8">
        <!-- Auth Card -->
        <div class="bg-white rounded-[3rem] p-10 shadow-2xl border border-slate-100/50 backdrop-blur-sm relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-emerald-500 to-primary"></div>
            
            <div class="text-center mb-10">
                <div class="inline-flex p-4 rounded-3xl bg-emerald-50 text-emerald-500 mb-6">
                    <span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                </div>
                <h2 class="text-3xl font-headline font-black text-primary tracking-tight mb-4">
                    Muvaffaqiyatli!
                </h2>
                <p class="text-slate-500 font-medium mb-8">Sizning parolingiz muvaffaqiyatli o'zgartirildi. Endi yangi parol bilan tizimga kirishingiz mumkin.</p>
                
                <a href="{% url 'account_login' %}" class="w-full flex items-center justify-center py-5 gradient-button text-white rounded-[2rem] font-bold text-lg shadow-xl hover:shadow-primary/20 transition-all active:scale-[0.98]">
                    Tizimga kirish
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
