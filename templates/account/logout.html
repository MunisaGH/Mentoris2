{% extends 'base.html' %}

{% block title %}{{ T.logout|default:"Chiqish" }}{% endblock %}

{% block content %}
<div class="h-full flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 bg-slate-50/50">
    <div class="max-w-md w-full space-y-8">
        <!-- Auth Card -->
        <div class="bg-white rounded-[3rem] p-10 shadow-2xl border border-slate-100/50 backdrop-blur-sm relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-red-500 to-orange-500"></div>
            
            <div class="text-center mb-10">
                <div class="inline-flex p-4 rounded-3xl bg-red-50 text-red-500 mb-6">
                    <span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">logout</span>
                </div>
                <h2 class="text-3xl font-headline font-black text-primary tracking-tight mb-2">
                    {{ T.logout|default:"Chiqish" }}
                </h2>
                <p class="text-slate-500 font-medium">Haqiqatan ham tizimdan chiqmoqchimisiz?</p>
            </div>

            <form method="POST" action="{% url 'account_logout' %}" class="space-y-4">
                {% csrf_token %}
                <button type="submit" class="w-full py-5 bg-red-500 text-white rounded-[2rem] font-bold text-lg shadow-xl shadow-red-500/20 hover:bg-red-600 transition-all active:scale-[0.98]">
                    {{ T.logout|default:"Chiqish" }}
                </button>
                <a href="/" class="w-full flex items-center justify-center py-5 bg-slate-100 text-slate-600 rounded-[2rem] font-bold text-lg hover:bg-slate-200 transition-all active:scale-[0.98]">
                    Bekor qilish
                </a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
