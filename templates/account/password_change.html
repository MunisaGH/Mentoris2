{% extends 'base.html' %}

{% block title %}Parolni o'zgartirish{% endblock %}

{% block content %}
<div class="h-full flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 bg-slate-50/50">
    <div class="max-w-md w-full space-y-8">
        <!-- Auth Card -->
        <div class="bg-white rounded-[3rem] p-10 shadow-2xl border border-slate-100/50 backdrop-blur-sm relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-primary to-secondary"></div>
            
            <div class="text-center mb-10">
                <div class="inline-flex p-4 rounded-3xl bg-primary/5 text-primary mb-6">
                    <span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">lock_reset</span>
                </div>
                <h2 class="text-3xl font-headline font-black text-primary tracking-tight mb-2">
                    Parolni o'zgartirish
                </h2>
                <p class="text-slate-500 font-medium">Akkauntingiz xavfsizligini ta'minlash uchun yangi parol o'rnating.</p>
            </div>

            <form method="POST" action="{% url 'account_change_password' %}" class="space-y-6">
                {% csrf_token %}
                <div class="space-y-4">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest pl-4">Eski parol</label>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">history_toggle_off</span>
                            <input type="password" name="old_password" id="id_old_password" required class="w-full pl-12 pr-12 py-4 rounded-2xl bg-slate-50 border-none focus:ring-2 focus:ring-primary/20 transition-all font-semibold text-primary">
                            <button type="button" onclick="togglePassword('id_old_password', 'pass-icon0')" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-primary transition-colors">
                                <span class="material-symbols-outlined text-xl" id="pass-icon0">visibility</span>
                            </button>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest pl-4">Yangi parol</label>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">key</span>
                            <input type="password" name="password1" id="id_password1" required class="w-full pl-12 pr-12 py-4 rounded-2xl bg-slate-50 border-none focus:ring-2 focus:ring-primary/20 transition-all font-semibold text-primary">
                            <button type="button" onclick="togglePassword('id_password1', 'pass-icon1')" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-primary transition-colors">
                                <span class="material-symbols-outlined text-xl" id="pass-icon1">visibility</span>
                            </button>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest pl-4">Parolni tasdiqlang</label>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">verified_user</span>
                            <input type="password" name="password2" id="id_password2" required class="w-full pl-12 pr-12 py-4 rounded-2xl bg-slate-50 border-none focus:ring-2 focus:ring-primary/20 transition-all font-semibold text-primary">
                            <button type="button" onclick="togglePassword('id_password2', 'pass-icon2')" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-primary transition-colors">
                                <span class="material-symbols-outlined text-xl" id="pass-icon2">visibility</span>
                            </button>
                        </div>
                    </div>
                </div>

                <button type="submit" class="w-full py-5 gradient-button text-white rounded-[2rem] font-bold text-lg shadow-xl shadow-primary/20 transition-all active:scale-[0.98]">
                    Parolni yangilash
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
